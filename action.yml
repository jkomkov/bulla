name: "bulla"
description: "Run bulla coherence analysis on agentic compositions"
author: "John Komkov"

branding:
  icon: "shield"
  color: "blue"

inputs:
  mode:
    description: "Analysis mode: 'check' (composition YAMLs), 'audit' (MCP manifests), or 'semver' (old/new semantic delta)"
    required: false
    default: "check"
  path:
    description: "Path to composition YAML file(s) or directory (check mode)"
    required: false
    default: "compositions/"
  manifests-dir:
    description: "Directory of MCP manifest JSON files (audit mode)"
    required: false
    default: ""
  mcp-config:
    description: "Path to MCP config file for live scan (audit mode)"
    required: false
    default: ""
  old-path:
    description: "Old/baseline composition YAML (semver mode)"
    required: false
    default: ""
  new-path:
    description: "New/updated composition YAML (semver mode)"
    required: false
    default: ""
  fail-on-major:
    description: "Fail semver mode when update-kind is semantic-major"
    required: false
    default: "false"
  fail-on-minor:
    description: "Fail semver mode when update-kind is semantic-minor or semantic-major"
    required: false
    default: "false"
  max-delta-r:
    description: "Fail semver mode when delta-r exceeds this integer threshold"
    required: false
    default: ""
  max-fee:
    description: "Maximum coherence fee before failing (audit mode, default: no limit)"
    required: false
    default: ""
  max-blind-spots:
    description: "Maximum blind spots before failing (default: 0 for check, no limit for audit)"
    required: false
    default: ""
  max-unbridged:
    description: "Maximum unbridged edges before failing (check mode, default: 0)"
    required: false
    default: "0"
  upload-sarif:
    description: "Upload SARIF results to GitHub Code Scanning (default: true)"
    required: false
    default: "true"
  version:
    description: "bulla version to install (default: latest)"
    required: false
    default: ""
  python-version:
    description: "Python version to use (default: 3.11)"
    required: false
    default: "3.11"

outputs:
  passed:
    description: "Whether the analysis passed all thresholds"
    value: ${{ steps.run.outputs.passed }}
  sarif-file:
    description: "Path to the generated SARIF file"
    value: ${{ steps.run.outputs.sarif_file }}
  coherence-fee:
    description: "Total coherence fee (audit mode)"
    value: ${{ steps.run.outputs.coherence_fee }}
  boundary-fee:
    description: "Cross-server boundary fee (audit mode)"
    value: ${{ steps.run.outputs.boundary_fee }}
  delta-r:
    description: "Semantic rank delta (semver mode)"
    value: ${{ steps.run.outputs.delta_r }}
  update-kind:
    description: "semantic-patch | semantic-minor | semantic-major (semver mode)"
    value: ${{ steps.run.outputs.update_kind }}
  coherence-preserving:
    description: "Whether update preserves coherence class (semver mode)"
    value: ${{ steps.run.outputs.coherence_preserving }}
  old-fee:
    description: "Baseline coherence fee (semver mode)"
    value: ${{ steps.run.outputs.old_fee }}
  new-fee:
    description: "Updated coherence fee (semver mode)"
    value: ${{ steps.run.outputs.new_fee }}
  minimum-bridge-delta:
    description: "Lower-bound bridge receipts needed to restore previous class (semver mode)"
    value: ${{ steps.run.outputs.minimum_bridge_delta }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install bulla
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "bulla==${{ inputs.version }}"
        else
          pip install bulla
        fi

    - name: Run bulla
      id: run
      shell: bash
      run: |
        SARIF_FILE="bulla-results.sarif"
        echo "sarif_file=${SARIF_FILE}" >> "$GITHUB_OUTPUT"

        MODE="${{ inputs.mode }}"
        EXIT_CODE=0

        if [ "$MODE" = "audit" ]; then
          # Build audit command
          AUDIT_CMD="bulla audit"

          if [ -n "${{ inputs.manifests-dir }}" ]; then
            AUDIT_CMD="$AUDIT_CMD --manifests ${{ inputs.manifests-dir }}"
          elif [ -n "${{ inputs.mcp-config }}" ]; then
            AUDIT_CMD="$AUDIT_CMD ${{ inputs.mcp-config }}"
          else
            echo "::error::audit mode requires either manifests-dir or mcp-config input"
            exit 1
          fi

          if [ -n "${{ inputs.max-fee }}" ]; then
            AUDIT_CMD="$AUDIT_CMD --max-fee ${{ inputs.max-fee }}"
          fi
          if [ -n "${{ inputs.max-blind-spots }}" ]; then
            AUDIT_CMD="$AUDIT_CMD --max-blind-spots ${{ inputs.max-blind-spots }}"
          fi

          # Run JSON output for structured data
          JSON_OUT=$(eval "$AUDIT_CMD --format json" 2>/dev/null) || true
          if [ -n "$JSON_OUT" ]; then
            FEE=$(echo "$JSON_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('coherence_fee',0))")
            BFEE=$(echo "$JSON_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('cross_server_decomposition',{}).get('boundary_fee',0))")
            echo "coherence_fee=${FEE}" >> "$GITHUB_OUTPUT"
            echo "boundary_fee=${BFEE}" >> "$GITHUB_OUTPUT"
          fi

          # Run SARIF output
          eval "$AUDIT_CMD --format sarif" > "${SARIF_FILE}" 2>/dev/null || EXIT_CODE=$?

        elif [ "$MODE" = "semver" ]; then
          if [ -z "${{ inputs.old-path }}" ] || [ -z "${{ inputs.new-path }}" ]; then
            echo "::error::semver mode requires both old-path and new-path inputs"
            exit 1
          fi
          JSON_OUT=$(bulla certify-update "${{ inputs.old-path }}" "${{ inputs.new-path }}" --format json) || EXIT_CODE=$?
          if [ -n "$JSON_OUT" ]; then
            DR=$(echo "$JSON_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('delta_r',0))")
            UK=$(echo "$JSON_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('update_kind','semantic-patch'))")
            CP=$(echo "$JSON_OUT" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('coherence_preserving',True)).lower())")
            OF=$(echo "$JSON_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('old_fee',0))")
            NF=$(echo "$JSON_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('new_fee',0))")
            MBD=$(echo "$JSON_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('minimum_bridge_delta',0))")
            echo "delta_r=${DR}" >> "$GITHUB_OUTPUT"
            echo "update_kind=${UK}" >> "$GITHUB_OUTPUT"
            echo "coherence_preserving=${CP}" >> "$GITHUB_OUTPUT"
            echo "old_fee=${OF}" >> "$GITHUB_OUTPUT"
            echo "new_fee=${NF}" >> "$GITHUB_OUTPUT"
            echo "minimum_bridge_delta=${MBD}" >> "$GITHUB_OUTPUT"

            POLICY_ERRORS=()
            if [ "${{ inputs.fail-on-major }}" = "true" ] && [ "$UK" = "semantic-major" ]; then
              POLICY_ERRORS+=("Policy violation: semantic-major update blocked by fail-on-major=true")
            fi
            if [ "${{ inputs.fail-on-minor }}" = "true" ] && { [ "$UK" = "semantic-minor" ] || [ "$UK" = "semantic-major" ]; }; then
              POLICY_ERRORS+=("Policy violation: semantic-minor/major update blocked by fail-on-minor=true")
            fi
            if [ -n "${{ inputs.max-delta-r }}" ]; then
              MAX_DR="${{ inputs.max-delta-r }}"
              if ! [[ "$MAX_DR" =~ ^-?[0-9]+$ ]]; then
                echo "::error::max-delta-r must be an integer, got '$MAX_DR'"
                EXIT_CODE=1
              elif [ "$DR" -gt "$MAX_DR" ]; then
                POLICY_ERRORS+=("Policy violation: delta_r=${DR} exceeds max-delta-r=${MAX_DR}")
              fi
            fi
            if [ ${#POLICY_ERRORS[@]} -gt 0 ]; then
              for msg in "${POLICY_ERRORS[@]}"; do
                echo "::error::${msg}"
              done
              EXIT_CODE=3
            fi
          fi
          LEVEL="note"
          if [ "${UK:-semantic-patch}" = "semantic-major" ]; then
            LEVEL="warning"
          fi
          if [ "$EXIT_CODE" -ne 0 ]; then
            LEVEL="error"
          fi
          python3 -c "import json,sys;sarif_file,level,uk,dr,cp=sys.argv[1:6];payload={'\$schema':'https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0-rtm.5.json','version':'2.1.0','runs':[{'tool':{'driver':{'name':'bulla','version':'semver'}},'results':[{'ruleId':f'semantic-semver-{uk}','level':level,'message':{'text':f'Semantic update classified as {uk} (delta_r={dr}, coherence_preserving={cp}).'}}]}]};open(sarif_file,'w').write(json.dumps(payload))" "$SARIF_FILE" "$LEVEL" "${UK:-semantic-patch}" "${DR:-0}" "${CP:-true}"

        else
          # Check mode (backward compatible)
          CHECK_CMD="bulla check"
          if [ -n "${{ inputs.max-blind-spots }}" ]; then
            CHECK_CMD="$CHECK_CMD --max-blind-spots ${{ inputs.max-blind-spots }}"
          else
            CHECK_CMD="$CHECK_CMD --max-blind-spots 0"
          fi
          CHECK_CMD="$CHECK_CMD --max-unbridged ${{ inputs.max-unbridged }}"
          CHECK_CMD="$CHECK_CMD --format sarif ${{ inputs.path }}"

          eval "$CHECK_CMD" > "${SARIF_FILE}" 2>/dev/null || EXIT_CODE=$?
        fi

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
          echo "::error::bulla ${MODE} failed with exit code ${EXIT_CODE}. Run 'bulla ${MODE} --help' for details."
          exit 1
        fi

    - name: Upload SARIF to GitHub Code Scanning
      if: always() && inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: bulla-results.sarif
      continue-on-error: true
