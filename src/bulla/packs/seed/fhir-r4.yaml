dimensions:
  fhir_resource_type:
    description: FHIR R4 resourceType discriminator. Inline seed of ~40 most-recurrent
      resources; the authoritative ~150 entries live at the values_registry pointer.
      R4→R5 introduces breaking changes on a subset of resources, so R4 and R5 packs
      are separate.
