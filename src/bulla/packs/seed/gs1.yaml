pack_name: gs1
pack_version: 0.1.0
license:
  spdx_id: Proprietary-Open-Reference
  source_url: https://www.gs1.org/standards/barcodes-epcrfid-id-keys/general-specifications
  registry_license: open
derives_from:
  standard: GS1-General-Specifications
  version: snapshot-2026-04-26
  source_uri: https://www.gs1.org/standards/barcodes-epcrfid-id-keys/general-specifications
dimensions:
  gs1_application_identifier:
    description: GS1 Application Identifier (AI) — the 2-4 digit prefix that identifies
      what data follows in a GS1-encoded barcode or message. The inline seed covers
      the ~20 most-recurrent AIs; the full table (~500 entries) lives at the values_registry
      pointer.
    field_patterns:
    - ai
    - application_identifier
    - gs1_ai
    - '*_ai'
    - '*_application_id'
    description_keywords:
    - gs1 application identifier
    - gs1 ai
    - application identifier
    domains:
    - universal
    known_values:
