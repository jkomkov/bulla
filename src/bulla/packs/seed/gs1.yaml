      aliases:
      - sscc
    - canonical: '01'
      aliases:
      - gtin
      - gtin-14
    - canonical: '02'
      aliases:
      - content-gtin
    - canonical: '10'
      aliases:
      - batch
      - lot
    - canonical: '11'
      aliases:
      - prod-date
      - production-date
    - canonical: '13'
      aliases:
