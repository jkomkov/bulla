      aliases:
      - best-before
    - canonical: '17'
      aliases:
      - expiry
      - expiration-date
    - canonical: '21'
      aliases:
      - serial
      - serial-number
    - canonical: '240'
      aliases:
      - additional-id
    - canonical: '30'
      aliases:
