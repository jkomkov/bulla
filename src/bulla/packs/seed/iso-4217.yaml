dimensions:
  currency_code:
    description: ISO 4217 currency code. The canonical form is the alpha-3 code (USD,
      EUR, JPY, ...); the numeric code (840, 978, 392, ...) is recorded as an alias
      so a field whose enum uses numeric-only codes still classifies under this dimension.
      Standards-tagged source_codes preserve the original ISO-4217-alpha and ISO-4217-numeric
      forms for consumers that need them.
    field_patterns:
    - '*_currency'
    - '*_currency_code'
    - currency
    - currency_code
    - ccy
    - ccy_code
    - ccyCode
    description_keywords:
    - currency code
    - iso 4217
    - iso-4217
    - alpha-3 currency
    - numeric currency
    domains:
    - financial
    - universal
