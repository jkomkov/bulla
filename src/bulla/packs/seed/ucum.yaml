dimensions:
  unit_of_measure:
    description: UCUM (Unified Code for Units of Measure) atomic unit. The full registry
      has ~600 base + derived units; the inline seed covers the ~50 most-common units
      across length, mass, time, volume, energy, substance, and force. Mars Climate
      Orbiter (lbf·s vs N·s), Patriot missile Dhahran (precision drift), and clinical
      tenfold mg/mcg errors are all UCUM-detectable at composition time.
