dimensions:
  language_code:
    description: ISO 639 language code. Canonical form is the ISO 639-1 alpha-2 code
      where one exists (en, fr, ja, ...); the ISO 639-3 alpha-3 code (eng, fra, jpn,
      ...) is recorded as an alias and as a source_code so either form classifies
      under this dimension. The inline seed covers the global top-~35 most-spoken
      languages plus common-software locales for documentation; the authoritative
      ~7700-entry SIL registry lives behind the values_registry pointer (per Extension
      B, the inline list is stripped from the pack hash so seed curation doesn't produce
      drift).
    field_patterns:
    - language
    - language_code
    - lang
    - lang_code
    - locale
    - locale_code
    - '*_language'
    - '*_lang'
    - '*_locale'
    - preferred_language
    description_keywords:
    - language code
    - iso 639
    - iso-639
    - bcp-47
    - bcp 47
    - alpha-2 language
    - alpha-3 language
    - ietf language tag
    domains:
    - universal
