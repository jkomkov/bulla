# Trusted Publishing to PyPI — no long-lived package token.
#
# This workflow is inert in the res-agentica monorepo and active in the public
# github.com/jkomkov/bulla mirror, where this directory becomes the repo root.
# PyPI Trusted Publishing must name owner=jkomkov, repo=bulla,
# workflow=publish.yml, environment=pypi.
#
# The 0.44 discipline is publish -> verify accepted artifacts and PEP 740
# provenance -> mint a signed ActionReceipt -> attach it durably. An unsigned or
# pre-publication artifact is never called a contemporaneous release receipt.
# If any post-publication step fails, rerun finalize-release.yml. Never retry
# the immutable PyPI upload or use twine/package credentials as a workaround.

name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run full test suite on the tagged commit
        run: |
          python -m pip install --upgrade pip
          pip install -e .[identity,ots] pytest pytest-timeout
          python -m pytest tests/ -q --timeout=600 | tee pytest-summary.txt

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify source, wheel, and sdist runtime parity
        run: python scripts/verify_release_archive_parity.py --root . --dist dist

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(ls dist/bulla-*.tar.gz | sed -E 's#.*/bulla-(.*)\.tar\.gz#\1#')
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG"

      - name: Publish to PyPI with Trusted Publishing attestations
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Verify PyPI accepted the exact artifacts and publisher identity
        run: |
          python -m pip install --upgrade pypi-attestations
          python scripts/verify_pypi_release.py \
            --version "${GITHUB_REF_NAME#v}" \
            --dist dist \
            --repository jkomkov/bulla

      - name: Mint signed post-publication release receipt
        env:
          BULLA_RELEASE_KEY: ${{ secrets.BULLA_RELEASE_KEY }}
        run: |
          TESTS=$(tail -1 pytest-summary.txt)
          mkdir -p release-receipt
          test -n "$BULLA_RELEASE_KEY" || { echo "BULLA_RELEASE_KEY is required" >&2; exit 1; }
          python scripts/mint_release_receipt.py \
            --dist dist \
            --out "release-receipt/${GITHUB_REF_NAME#v}.json" \
            --ots \
            --test-result "$TESTS" \
            --repository jkomkov/bulla
          python -m bulla receipt verify "release-receipt/${GITHUB_REF_NAME#v}.json"

      - name: Attach receipt to durable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" release-receipt/* --clobber

      - name: Upload receipt to the workflow record
        uses: actions/upload-artifact@v7
        with:
          name: release-receipt
          path: release-receipt/
          if-no-files-found: error
