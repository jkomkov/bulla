name: bulla

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coherence-check:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bulla from source
        run: pip install -e .

      - name: Run bulla on bundled examples (smoke — demos carry blind spots by design)
        run: |
          bulla check --max-blind-spots 5 --format sarif compositions/ > bulla.sarif 2>/dev/null || true
          test -s bulla.sarif && echo "bulla ran and produced SARIF ($(wc -c < bulla.sarif) bytes) ✓"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bulla.sarif
        continue-on-error: true

  semver-smoke:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: SemVer action smoke (allow mode)
        id: semver_allow
        uses: ./
        with:
          mode: semver
          old-path: compositions/auth_pipeline.yaml
          new-path: compositions/financial_pipeline.yaml
          upload-sarif: true

      - name: Validate semver outputs
        run: |
          test -n "${{ steps.semver_allow.outputs.delta-r }}"
          test -n "${{ steps.semver_allow.outputs.update-kind }}"
          test -n "${{ steps.semver_allow.outputs.coherence-preserving }}"
          test -n "${{ steps.semver_allow.outputs.old-fee }}"
          test -n "${{ steps.semver_allow.outputs.new-fee }}"
          test -n "${{ steps.semver_allow.outputs.minimum-bridge-delta }}"

      - name: SemVer policy gate blocks major
        id: semver_block
        continue-on-error: true
        uses: ./
        with:
          mode: semver
          old-path: compositions/auth_pipeline.yaml
          new-path: compositions/financial_pipeline.yaml
          fail-on-major: true
          upload-sarif: false

      - name: Assert policy gate failure occurred
        run: test "${{ steps.semver_block.outcome }}" = "failure"

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[ots,identity]"
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v
